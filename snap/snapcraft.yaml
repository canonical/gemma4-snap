name: gemma4
base: core24
summary: Inference Snap for Gemma 4
description: See snapcraft.io/gemma4

adopt-info: version

grade: stable
confinement: strict
compression: lzo

assumes:
  - snapd2.68 # for components support

platforms:
  amd64:
  arm64:

slots:
  status:
    interface: content
    source:
      read:
        - &status-share $SNAP_DATA/share/status
  open-webui:
    interface: content
    content: open-webui-config
    source:
      read:
        - &owui-share $SNAP_DATA/share/open-webui

plugs:
  intel-npu:
    interface: custom-device
    custom-device: intel-npu-device
  npu-libs:
    interface: content
    content: npu-libs-2404
    target: $SNAP/npu-libs
  # To allow side-loading models into server (root daemon) from user home directory
  home:
    read: all

environment:
  SNAP_COMPONENTS: /snap/$SNAP_INSTANCE_NAME/components/$SNAP_REVISION
  ARCH_TRIPLET: $CRAFT_ARCH_TRIPLET_BUILD_FOR
  STATUS_SHARE: *status-share # Status directory shared via content interface
  OWUI_SHARE: *owui-share # Open WebUI config directory shared via content interface
  # This is to find the intel.icd file, containing the path to libigdrcl.so
  # Required for Intel GPU detection and communication
  OCL_ICD_VENDORS: $SNAP/etc/OpenCL/vendors

layout:
  # OpenCL looks in /etc/OpenCL/vendors for .icd files containing the paths to shared objects
  /etc/OpenCL/vendors:
    bind: $SNAP/etc/OpenCL/vendors
  # Intel icd files use an absolute path to Intel OpenCL shared objects. Use a layout to mount the so files at the expected location
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/intel-opencl:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/intel-opencl
  # Under wsl the libraries are expected in /usr/lib/wsl
  /usr/lib/wsl:
    bind: $SNAP_COMMON/usr/lib/wsl

hooks:
  install:
    plugs: &install-plugs
      # For hardware detection
      - hardware-observe
      - opengl
  post-refresh:
    plugs: *install-plugs

parts:
  version:
    after: [cli]
    plugin: nil
    source: . # To regenerate the git hash on every change
    build-packages:
      - jq
      - git
    override-pull: |
      # Do nothing. This significantly reduces build time when sourcing large files.
    override-build: |
      set -eo pipefail
      cli_version=$($CRAFT_STAGE/bin/gemma4 version --format=json | jq .cli --raw-output)
      git_hash=$(git -C "$SNAPCRAFT_PROJECT_DIR" describe --always)
      craftctl set version="${cli_version}+${git_hash}"

  cli:
    #    source:
    #      - on amd64: https://github.com/canonical/inference-snaps-cli/releases/download/v1.0.0/inference-snaps-cli-linux-amd64.tar.xz
    #      - on arm64: https://github.com/canonical/inference-snaps-cli/releases/download/v1.0.0/inference-snaps-cli-linux-arm64.tar.xz
    #    plugin: dump
    #    override-build: |
    #      mkdir -p bin
    #      mv cli bin/modelctl
    #
    #      # For tab completion
    #      ln --symbolic ./modelctl bin/gemma4
    #
    #      craftctl default
    source: https://github.com/canonical/inference-snaps-cli.git
    source-branch: IENG-2398-model-meta
    plugin: go
    build-snaps:
      - go/1.26/stable
    override-build: |
      craftctl default

      # For tab completion
      ln --symbolic ./modelctl $CRAFT_PART_INSTALL/bin/gemma4
    organize:
      bin/cli: bin/modelctl
    
  cli-dependencies:
    plugin: nil
    stage-packages:
      - pciutils # lspci
      - clinfo # used for Intel GPU vRAM detection. It depends on intel-opencl-icd

  # Used for NVIDIA vRAM and CUDA Capability detection.
  # Only the binary is included to avoid staging libraries, which should instead be provided by the host through the opengl interface.
  cli-nvidia-smi:
    plugin: nil
    build-packages:
      - nvidia-utils-580
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp /usr/bin/nvidia-smi $CRAFT_PART_INSTALL/usr/bin/
      
      license_dir=$CRAFT_PART_INSTALL/usr/share/doc/nvidia-utils-580/
      mkdir -p $license_dir
      cp /usr/share/doc/nvidia-utils-580/copyright $license_dir/

  # OpenCL ICD and libigdgmm are required for Intel GPU vRAM lookup with clinfo
  cli-intel-opencl-icd:
    plugin: nil
    build-packages:
      - wget
    override-build: |
      if [ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ]; then
        # Legacy
        wget -nv https://github.com/intel/compute-runtime/releases/download/24.35.30872.36/intel-opencl-icd-legacy1_24.35.30872.36_amd64.deb
        wget -nv https://github.com/intel/compute-runtime/releases/download/24.35.30872.36/libigdgmm12_22.5.0_amd64.deb
      
        # Latest
        wget -nv https://github.com/intel/compute-runtime/releases/download/26.01.36711.4/intel-opencl-icd_26.01.36711.4-0_amd64.deb
        wget -nv https://github.com/intel/compute-runtime/releases/download/26.01.36711.4/libigdgmm12_22.9.0_amd64.deb
      
        dpkg --root=$CRAFT_PART_INSTALL --force-all -i *.deb
      
        # Two symlinks are created when installing intel-opencl-icd-legacy: 
        # etc/alternatives/ocloc -> /usr/bin/ocloc-24.35.0, usr/bin/ocloc -> /etc/alternatives/ocloc
        # These point to outside of the snap and fails store review. They are not required, so remove it.
        rm $CRAFT_PART_INSTALL/etc/alternatives/ocloc
        rm $CRAFT_PART_INSTALL/usr/bin/ocloc
      fi
      
      craftctl default

  webui:
    plugin: dump
    source: https://github.com/canonical/inference-snaps-webui/releases/download/v1.0.0/inference-snaps-webui.tar.xz
    organize:
      "*": webui/

  engines:
    source: engines
    plugin: dump
    organize:
      "*": engines/

  models:
    source: models
    plugin: dump
    organize:
      "*": models/

  runtimes:
    source: runtimes
    plugin: dump
    organize:
      "*": runtimes/
  
  scripts:
    source: scripts
    plugin: dump
    stage-packages:
      - jq
    organize:
      "server.sh": bin/
      "server-webui.sh": bin/
      "export-shared-configs.sh": bin/
      "completion.bash": bin/

  local-component-files:
    plugin: dump
    source: components
    organize:
      "model-e2b-q4-k-m-gguf/*": (component/model-e2b-q4-k-m-gguf)
      "model-e4b-q4-k-m-gguf/*": (component/model-e4b-q4-k-m-gguf)
      "model-26b-a4b-q4-k-m-gguf/gemma-4-26B-A4B-it-UD-Q4_K_M-00001-of-00004.gguf": (component/model-26b-a4b-q4-k-m-1-of-4)
      "model-26b-a4b-q4-k-m-gguf/gemma-4-26B-A4B-it-UD-Q4_K_M-00002-of-00004.gguf": (component/model-26b-a4b-q4-k-m-2-of-4)
      "model-26b-a4b-q4-k-m-gguf/gemma-4-26B-A4B-it-UD-Q4_K_M-00003-of-00004.gguf": (component/model-26b-a4b-q4-k-m-3-of-4)
      "model-26b-a4b-q4-k-m-gguf/gemma-4-26B-A4B-it-UD-Q4_K_M-00004-of-00004.gguf": (component/model-26b-a4b-q4-k-m-4-of-4)
      "mmproj-e2b-bf16-gguf/*": (component/mmproj-e2b-bf16-gguf)
      "mmproj-e4b-q8-0-gguf/*": (component/mmproj-e4b-q8-0-gguf)
      "mmproj-26b-bf16-gguf/*": (component/mmproj-26b-bf16-gguf)

    prime:
      # Exclude everything not explicitly organized
      - -*

  model-e4b-it-int4-ov-1-of-2:
    plugin: dump
    source: components/model-e4b-it-int4-ov/gemma4-e4b-it-int4-ov
    organize:
      "*": (component/model-e4b-it-int4-ov-1-of-2)/
    prime:
      - "-(component/model-e4b-it-int4-ov-1-of-2)/openvino_text_embeddings*"
      - "*"

  model-e4b-it-int4-ov-2-of-2:
    plugin: dump
    source: components/model-e4b-it-int4-ov/gemma4-e4b-it-int4-ov
    organize:
      "openvino_text_embeddings*": (component/model-e4b-it-int4-ov-2-of-2)/
    prime:
      - "(component/model-e4b-it-int4-ov-2-of-2)/openvino_text_embeddings*"
      - -*

  llamacpp:
    plugin: dump
    source: 
      - on amd64: https://github.com/canonical/llama.cpp-builds/releases/download/b8893/llamacpp-amd64.tar.gz
      - on arm64: https://github.com/canonical/llama.cpp-builds/releases/download/b8893/llamacpp-arm64.tar.gz
    stage-packages:
      - libgomp1
    organize:
      "licenses": usr/share/doc/llama.cpp # Add licenses to the snap
      "*": (component/llamacpp)
    
  llamacpp-cuda:
    plugin: dump
    source:
      - on amd64: https://github.com/canonical/llama.cpp-builds/releases/download/b8893/llamacpp-amd64+cuda12.tar.gz
      - on arm64: https://github.com/canonical/llama.cpp-builds/releases/download/b8893/llamacpp-arm64+cuda12.tar.gz
    stage-packages:
      - libgomp1
    organize:
      "licenses": usr/share/doc/llama.cpp+cuda # Add licenses to the snap
      "*": (component/llamacpp-cuda)

  llamacpp-rocm-amd64:
    plugin: dump
    source: https://github.com/canonical/llama.cpp-builds/releases/download/b8893/llamacpp-amd64+rocm.tar.gz
    stage-packages:
      - libgomp1
      - libatomic1
    organize:
      "licenses": usr/share/doc/llama.cpp+rocm # Add licenses to the snap
      "*": (component/llamacpp-rocm)
    # This part is only for amd64
    override-pull: &amd64-only |
      [ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ] && craftctl default || exit 0
    override-build: *amd64-only
    override-stage: *amd64-only
    override-prime: *amd64-only

  openvino-model-server:
    plugin: dump
    source:
      # Source OVMS binaries only on amd64
      - on amd64: https://github.com/openvinotoolkit/model_server/releases/download/v2026.2/ovms_ubuntu24_2026.2.0_python_off.tar.gz
      - on arm64: components/openvino-model-server
    stage-packages:
      - on amd64:
          - libxml2
          - libcurl4
    override-build: |
      craftctl default
      if [ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ]; then
        license_dir=$CRAFT_PART_INSTALL/usr/share/doc/openvino-model-server
        mkdir -p $license_dir
        cp $CRAFT_PART_SRC/LICENSE $license_dir/
      fi
    organize:
      # move everything, including the staged packages
      "*": (component/openvino-model-server)

  # For Intel GPU usage, amd64 only
  intel-compute-runtime:
    plugin: nil
    build-packages:
      - wget
    stage-packages:
      - on amd64:
          - ocl-icd-libopencl1
    override-build: |
      if [ "$CRAFT_ARCH_BUILD_FOR" == "amd64" ]; then
        # First install the legacy support version. Then install the latest, so that latest can override any old libraries.
      
        # Legacy: https://github.com/intel/compute-runtime/releases/tag/24.35.30872.36
        mkdir -p $CRAFT_PART_BUILD/opencl-intel-legacy1
        cd $CRAFT_PART_BUILD/opencl-intel-legacy1
        wget -nv https://github.com/intel/intel-graphics-compiler/releases/download/igc-1.0.17537.24/intel-igc-core_1.0.17537.24_amd64.deb
        wget -nv https://github.com/intel/intel-graphics-compiler/releases/download/igc-1.0.17537.24/intel-igc-opencl_1.0.17537.24_amd64.deb
        wget -nv https://github.com/intel/compute-runtime/releases/download/24.35.30872.36/intel-level-zero-gpu-legacy1_1.5.30872.36_amd64.deb
        dpkg --root=$CRAFT_PART_INSTALL --force-all -i *.deb
      
        # Latest: https://github.com/intel/compute-runtime/releases/tag/26.01.36711.4
        mkdir -p $CRAFT_PART_BUILD/opencl-intel
        cd $CRAFT_PART_BUILD/opencl-intel
        wget -nv https://github.com/intel/intel-graphics-compiler/releases/download/v2.27.10/intel-igc-core-2_2.27.10+20617_amd64.deb
        wget -nv https://github.com/intel/intel-graphics-compiler/releases/download/v2.27.10/intel-igc-opencl-2_2.27.10+20617_amd64.deb
        wget -nv https://github.com/intel/compute-runtime/releases/download/26.01.36711.4/intel-ocloc_26.01.36711.4-0_amd64.deb
        wget -nv https://github.com/intel/compute-runtime/releases/download/26.01.36711.4/libze-intel-gpu1_26.01.36711.4-0_amd64.deb
        dpkg --root=$CRAFT_PART_INSTALL --force-all -i *.deb
      
        cd $CRAFT_PART_BUILD
      fi # End of Intel Compute Runtime installation
      
      craftctl default
    organize:
      # move everything, including the staged packages
      "*": (component/openvino-model-server)

  notice:
    plugin: nil
    source: NOTICE
    source-type: file
    override-build: |
      license_dir=$CRAFT_PART_INSTALL/usr/share/doc
      mkdir -p $license_dir
      cp NOTICE $license_dir/
      cp $SNAPCRAFT_PROJECT_DIR/LICENSE $license_dir/
      cp $SNAPCRAFT_PROJECT_DIR/LICENSE-gemma4 $license_dir/

components:
  model-e2b-q4-k-m-gguf:
    type: standard
    summary: Google Gemma 4 E2B Q4_K_M GGUF
    description: Model weights for Google Gemma 4 E2B (Efficient 2B) in GGUF format

  mmproj-e2b-bf16-gguf:
    type: standard
    summary: Google Gemma 4 E2B multimodal projector BF16 GGUF
    description: Multimodal projector weights for Google Gemma 4 E2B vision support in GGUF format

  model-e4b-q4-k-m-gguf:
    type: standard
    summary: Google Gemma 4 E4B Q4_K_M GGUF
    description: Model weights for Google Gemma 4 E4B (Efficient 4B) in GGUF format

  mmproj-e4b-q8-0-gguf:
    type: standard
    summary: Google Gemma 4 E4B multimodal projector Q8_0 GGUF
    description: Multimodal projector weights for Google Gemma 4 E4B vision support in GGUF format

  model-e4b-it-int4-ov-1-of-2: &model-e4b-it-int4-ov
    type: standard
    summary: Google Gemma 4 E4B INT4 OpenVINO format
    description: Model weights for Google Gemma 4 E4B (Efficient 4B) in OpenVINO format, quantized to INT4

  model-e4b-it-int4-ov-2-of-2:
    <<: *model-e4b-it-int4-ov

  model-26b-a4b-q4-k-m-1-of-4: &model-26b-a4b-q4-k-m
    type: standard
    summary: Google Gemma 4 26B A4B multimodal projector Q4_K_M GGUF
    description: Model weights for Google Gemma 4 26B A4B in GGUF format

  model-26b-a4b-q4-k-m-2-of-4:
    <<: *model-26b-a4b-q4-k-m

  model-26b-a4b-q4-k-m-3-of-4:
    <<: *model-26b-a4b-q4-k-m
  
  model-26b-a4b-q4-k-m-4-of-4:
    <<: *model-26b-a4b-q4-k-m

  mmproj-26b-bf16-gguf:
    type: standard
    summary: Google Gemma 4 26B A4B multimodal projector BF16 GGUF
    description: Multimodal projector weights for Google Gemma 4 26B A4B vision support in GGUF format

  llamacpp:
    type: standard
    summary: llama.cpp using default CPU instruction sets
    description: LLM inference in C/C++
  
  llamacpp-cuda:
    type: standard
    summary: llama.cpp with CUDA backend
    description: LLM inference in C/C++

  llamacpp-rocm:
    type: standard
    summary: llama.cpp with ROCm backend
    description: LLM inference in C/C++

  openvino-model-server:
    type: standard
    summary: OpenVINO Model Server
    description: OpenVINO Model Server for serving models

apps:
  gemma4:
    command: bin/gemma4
    completer: bin/completion.bash
    plugs:
      - hardware-observe
      - opengl
      - network
      - desktop # To open the webui in the browser
    environment:
      ADDITIONAL_FEATURES: chat, webui

  server:
    command: bin/server.sh
    daemon: simple
    plugs:
      - network-bind
      - hardware-observe
      - opengl
      - process-control
      - home
      - intel-npu
      - npu-libs

  server-webui:
    command: bin/server-webui.sh
    daemon: simple
    plugs:
      - network-bind
