name: gemma4-26b-a4b

description: Gemma 4 26B-A4B, a multimodal (text + vision) Mixture-of-Experts instruction-tuned model
model-card-url: https://huggingface.co/inference-snaps/gemma-4-26B-A4B-it-UD-Q4_K_M-5GB
quantization: UD-Q4_K_M

disk-size: 16163M

capabilities:
  - text
  - vision
  - thinking
  - tools

components:
  - mmproj-26b-bf16-gguf
  - model-26b-a4b-q4-k-m-1-of-4
  - model-26b-a4b-q4-k-m-2-of-4
  - model-26b-a4b-q4-k-m-3-of-4
  - model-26b-a4b-q4-k-m-4-of-4

environment:
  # The model is split into multiple shards, maintained in individual component directories.
  # However, llama-server expects the shards to be located in the same directory.
  # The layout below flattens them into a single directory via symlinks.
  # The model file path is set to the first shard's symlink:
  - MODEL_NAME=gemma4-26b-a4b-q4-k-m
  - MMPROJ_FILE=$SNAP_COMPONENTS/mmproj-26b-bf16-gguf/mmproj-BF16.gguf
  - SHARDS_DIR=/tmp/model-26b-a4b-it-q4-k-m-shards
  - MODEL_FILE=$SHARDS_DIR/gemma-4-26B-A4B-it-UD-Q4_K_M-00001-of-00004.gguf

layout:
  $SHARDS_DIR/gemma-4-26B-A4B-it-UD-Q4_K_M-00001-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-26b-a4b-q4-k-m-1-of-4/gemma-4-26B-A4B-it-UD-Q4_K_M-00001-of-00004.gguf
  $SHARDS_DIR/gemma-4-26B-A4B-it-UD-Q4_K_M-00002-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-26b-a4b-q4-k-m-2-of-4/gemma-4-26B-A4B-it-UD-Q4_K_M-00002-of-00004.gguf
  $SHARDS_DIR/gemma-4-26B-A4B-it-UD-Q4_K_M-00003-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-26b-a4b-q4-k-m-3-of-4/gemma-4-26B-A4B-it-UD-Q4_K_M-00003-of-00004.gguf
  $SHARDS_DIR/gemma-4-26B-A4B-it-UD-Q4_K_M-00004-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-26b-a4b-q4-k-m-4-of-4/gemma-4-26B-A4B-it-UD-Q4_K_M-00004-of-00004.gguf
