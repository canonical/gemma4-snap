name: amd-gpu-q3
description: "Use ROCm for inference on AMD GPUs. Model quantized to Q3_K_S for better performance on supported hardware."
vendor: Canonical Ltd
grade: devel
devices:
  allof:
    - type: cpu
      architecture: amd64
  anyof:
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1152
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1032
memory: 8G
disk-space: 8G
components:
  - llamacpp-rocm
  - model-e4b-q3-k-s-gguf
  - mmproj-e4b-q8-0-gguf
configurations:
  sleep-idle-seconds: 600
