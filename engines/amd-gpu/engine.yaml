name: amd-gpu
summary: ROCm-optimized for workstation GPUs
description: |
  This engine uses llama.cpp with the ROCm backend.

  It supports the following AMD GPU microarchitectures:
  - gfx1010
  - gfx1011
  - gfx1012
  - gfx1030
  - gfx1031
  - gfx1032
  - gfx1100
  - gfx1101
  - gfx1102
  - gfx1150
  - gfx1151
  - gfx1152
  - gfx1153
  - gfx1200
  - gfx1201
vendor: Canonical Ltd

devices:
  allof:
    - type: cpu
      architecture: amd64
  anyof:
    - type: gpu
      vendor-id: 0x1002 # AMD Corporation
      microarchitecture: gfx1010
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1011
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1012
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1030
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1031
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1032
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1100
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1101
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1102
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1150
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1151
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1152
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1153
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1200
    - type: gpu
      vendor-id: 0x1002
      microarchitecture: gfx1201

runtime: llamacpp-rocm

model:
  default: e4b-q4-k-m-gguf
  options:
    - e2b-q4-k-m-gguf
    - e4b-q4-k-m-gguf
    - 26b-a4b-q4-k-m-gguf

configurations:
  sleep-idle-seconds: 600
