name: intel-cpu
description: Optimized for Intel CPUs
vendor: Canonical Ltd

devices:
  allof:
    - type: cpu
      architecture: amd64
  anyof:
    # Panther Lake NPU
    - type: npu
      vendor-id: 0x8086 # Intel Corporation
      device-id: 0xb03e
      snap-connections: [ intel-npu, npu-libs ]
    # Lunar Lake NPU
    - type: npu
      vendor-id: 0x8086 # Intel Corporation
      device-id: 0x643e
      snap-connections: [ intel-npu, npu-libs ]
    # Meteor / Arrow Lake NPUs
    - type: npu
      vendor-id: 0x8086
      device-id: 0x7d1d
      snap-connections: [ intel-npu, npu-libs ]

runtime: openvino-model-server

model:
  default: e4b-it-int4-ov
  options:
    - e4b-it-int4-ov
