name: intel-cpu
summary: Optimized for Intel CPUs
description: |
  This engine uses OpenVINO Model Server.
  
  It is optimized for a range of Intel CPUs.
vendor: Canonical Ltd

devices:
  allof:
    - type: cpu
      architecture: amd64
      manufacturer-id: GenuineIntel

runtime: openvino-model-server

model:
  default: e4b-it-int4-ov
  options:
    - e4b-it-int4-ov
