name: intel-onemkl
summary: Intel CPU-optimized for workstations using oneMKL
vendor: Canonical Ltd
experimental: true
devices:
  anyof:
    - type: cpu
      architecture: amd64

runtime: llamacpp-onemkl

model:
  default: gemma4-e4b
  options:
    - gemma4-e2b
    - gemma4-e4b
    - gemma4-26b-a4b

configurations:
  sleep-idle-seconds: 600
