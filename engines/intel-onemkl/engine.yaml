name: intel-onemkl
summary: Intel CPU-optimized for workstations using oneMKL
vendor: Canonical Ltd
experimental: true
devices:
  anyof:
    - type: cpu
      architecture: amd64

runtime: llamacpp-onemkl

model:
  default: e4b
  options:
    - e2b
    - e4b
    - 26b-a4b

configurations:
  sleep-idle-seconds: 600
