name: intel-onemkl
summary: Intel CPU-optimized for workstations using oneMKL
vendor: Canonical Ltd
experimental: true
devices:
  anyof:
    - type: cpu
      architecture: amd64

runtime: llamacpp-onemkl

model:
  default: e4b-q4-k-m-gguf
  options:
    - e2b-q4-k-m-gguf
    - e4b-q4-k-m-gguf
    - 26b-a4b-q4-k-m-gguf

configurations:
  sleep-idle-seconds: 600
