name: CICD

on:
  push:
    branches:
      - main
      - smoke-test
  
  workflow_dispatch: # manual trigger 


# Keep one CICD run active at a time so publish/test/promote happen in order
concurrency:
  group: ${{ github.workflow }}
  queue: max

jobs:
  cicd:
    if: github.repository == 'canonical/gemma4-snap' # do not run on forks
    uses: canonical/inference-snaps-dev/.github/workflows/reuse-cicd.yaml@extend-smoke-test-config # v2
    with:
      build-runner: |
        [
          ["amd64", "2xlarge-extra", "noble", "self-hosted"],
          ["arm64", "large-extra", "noble", "self-hosted"]
        ]
      build-init-script: 'download-models.sh'
      store-track: latest
      snap-name: gemma4
      smoke-test-engine: cpu
    secrets:
      store-credentials: ${{ secrets.STORE_LOGIN_MAIN }}
