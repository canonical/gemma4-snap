name: Agentic Snap Test

on:
  schedule:
    - cron: "20 20 * * 0" # Weekly on Sunday

jobs:
  ai-test:
    runs-on: ubuntu-latest
    steps:
      - name: Run test
        uses: canonical/inference-snaps-dev/.github/actions/agentic-test@agentic-test
        with:
          snap-name: gemma4
          snap-channel: beta
          create-issues: true
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          issue-create-token: ${{ secrets.ISSUE_CREATE_TOKEN }}
